name: docker-image

# Build, smoke-test and publish the Mininet-WiFi Docker image to GHCR.
#
# What runs where: the image is pure userspace and builds on any runner, but the
# functional tests need mac80211_hwsim, which lives in the HOST kernel — the
# image cannot ship a kernel module. The smoke job therefore loads hwsim on the
# runner and passes it into a privileged container (mounting /lib/modules). The
# 802.11az PMSR / secure-LTF path needs a patched hwsim and a pinned kernel and
# is intentionally out of scope here (that belongs on a self-hosted runner).
#
# Publishing: pull requests build and test but never push (so forks are safe);
# pushes to the default branch publish :latest and :sha; version tags publish an
# immutable :vX.Y.Z; a weekly schedule rebuilds for base-image freshness.

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/mininet-wifi

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install pyflakes
      # Mirrors the pyflakes half of `make errcheck` (undefined names / syntax),
      # scoped to the package; examples are excluded as they are demo scripts.
      - name: pyflakes
        run: find mn_wifi -name '*.py' -not -path '*/examples/*' -print0 | xargs -0 pyflakes

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # the Dockerfile's `COPY . .` needs the mininet submodule

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      # Build once and load into the runner's Docker so the smoke job can use the
      # exact image that will be published. Cached across runs to keep it quick.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mininet-wifi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load mac80211_hwsim on the runner
        run: |
          sudo apt-get update
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe mac80211_hwsim

      # Run Mininet-WiFi's own functional tests inside the built image. debugfs
      # and Open vSwitch are started here because the base Dockerfile has no
      # entrypoint doing so; hwsim comes from the host via /lib/modules.
      - name: Smoke test (make test)
        run: |
          docker run --rm --privileged \
            -v /lib/modules:/lib/modules \
            mininet-wifi:ci \
            bash -c '
              mount -t debugfs none /sys/kernel/debug 2>/dev/null || true
              service openvswitch-switch start >/dev/null 2>&1 \
                || /usr/share/openvswitch/scripts/ovs-ctl start >/dev/null 2>&1 || true
              mn -c >/dev/null 2>&1 || true
              make test
            '

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the tested image. Skipped on pull_request (including forks, which
      # get no write token anyway).
      - name: Push tags
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag mininet-wifi:ci "$tag"
            docker push "$tag"
          done <<< '${{ steps.meta.outputs.tags }}'
